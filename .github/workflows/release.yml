name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win-x64
            bin: cloudflare-d1-plugin.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            bin: cloudflare-d1-plugin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" .
          $zipName = "cloudflare-d1-${{ matrix.platform }}-$version.zip"
          Compress-Archive -Path "${{ matrix.bin }}", manifest.json, .tabularium -DestinationPath $zipName -Force
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" .
          zip_name="cloudflare-d1-${{ matrix.platform }}-${version}.zip"
          zip "$zip_name" "${{ matrix.bin }}" manifest.json .tabularium
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ZIP_NAME }}

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
