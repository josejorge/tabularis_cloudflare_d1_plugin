name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win-x64
            bin: cloudflare-d1-plugin.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            bin: cloudflare-d1-plugin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stage="cloudflare-d1"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$stage/"
          cp manifest.json "$stage/"
          cp .tabularium "$stage/"
          zip_name="cloudflare-d1-${{ matrix.platform }}-${version}.zip"
          zip -r "$zip_name" "$stage"
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}

  # The Tabularium registry resolves a release by scanning its published assets
  # for a file literally named `.tabularium` — it does not unzip the platform
  # archives. Publish the manifest as a standalone asset (in addition to
  # bundling it in each zip), otherwise the registry falls back to the unsigned
  # repo-root path (no signed integrity / per-asset SHA-256).
  manifest:
    name: Attach .tabularium manifest asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload .tabularium to the release
        uses: softprops/action-gh-release@v2
        with:
          files: .tabularium
          fail_on_unmatched_files: true
